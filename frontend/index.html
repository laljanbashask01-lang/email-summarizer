<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email AI Analyzer</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📧 Email AI Analyzer</h1>
            <p class="subtitle">Summarize • Sentiment • Spam Detection • Smart Insights</p>
            <div class="header-actions">
                <button id="btn-login" class="btn btn-primary">Connect Gmail</button>
                <button id="btn-fetch" class="btn btn-secondary" disabled>Fetch & Analyze</button>
            </div>
        </header>

        <div id="notification-toast" class="toast hidden" role="alert" aria-live="polite">
            <div class="toast-content">
                <span class="toast-icon">🔔</span>
                <div class="toast-text">
                    <strong id="toast-title"></strong>
                    <p id="toast-message"></p>
                </div>
            </div>
        </div>

        <main>
            <div class="stats-bar">
                <div class="stat" id="stat-total">
                    <span class="stat-value">0</span>
                    <span class="stat-label">Total</span>
                </div>
                <div class="stat stat-high" id="stat-high">
                    <span class="stat-value">0</span>
                    <span class="stat-label">High Priority</span>
                </div>
                <div class="stat stat-spam" id="stat-spam">
                    <span class="stat-value">0</span>
                    <span class="stat-label">Spam/Phishing</span>
                </div>
                <div class="stat stat-positive" id="stat-positive">
                    <span class="stat-value">0</span>
                    <span class="stat-label">Positive</span>
                </div>
                <div class="stat stat-negative" id="stat-negative">
                    <span class="stat-value">0</span>
                    <span class="stat-label">Negative</span>
                </div>
            </div>

            <div class="filter-bar">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="high">🔴 High Priority</button>
                <button class="filter-btn" data-filter="spam">⚠️ Spam/Phishing</button>
                <button class="filter-btn" data-filter="positive">😊 Positive</button>
                <button class="filter-btn" data-filter="negative">😟 Negative</button>
            </div>

            <div class="email-list" id="email-list">
                <p class="placeholder">Connect your Gmail to start analyzing emails with AI.</p>
            </div>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
